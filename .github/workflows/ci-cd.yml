name: CI/CD Pipeline TP

on:
  push:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code du depot
        uses: actions/checkout@v4

      # --- NOUVELLE ÉTAPE : INSTALLER JAVA ET COMPILER ---
      - name: Setup Java JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven

      - name: Compiler le Backend avec Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      - name: Se connecter a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./springboot/app
          file: ./springboot/app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-backend:latest

      - name: Build et Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./angular-app
          file: ./angular-app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-frontend:latest

      - name: Tester le lancement avec Docker Compose
        run: |
          docker compose up -d
          sleep 30
          docker compose ps
